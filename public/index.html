<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Fin d'Année</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d0d14;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,255,.1) 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,rgba(255,72,162,.08) 0%,transparent 50%);}
    .wrap{position:relative;z-index:1;text-align:center;max-width:500px;width:100%;}
    .logo{font-size:80px;display:block;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    h1{font-size:42px;font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:8px;}
    h1 span{background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    p{font-size:16px;color:rgba(255,255,255,.45);margin-bottom:40px;}
    .cards{display:flex;flex-direction:column;gap:14px;}
    .card{display:flex;align-items:center;gap:18px;padding:22px 24px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;text-decoration:none;transition:all .25s;backdrop-filter:blur(10px);text-align:left;}
    .card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.08);}
    .card.admin{border-color:rgba(108,99,255,.3);}
    .card.admin:hover{border-color:rgba(108,99,255,.6);box-shadow:0 0 30px rgba(108,99,255,.15);}
    .card.eleve{border-color:rgba(0,212,255,.3);}
    .card.eleve:hover{border-color:rgba(0,212,255,.6);box-shadow:0 0 30px rgba(0,212,255,.1);}
    .card .icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
    .card.admin .icon{background:rgba(108,99,255,.2);}
    .card.eleve .icon{background:rgba(0,212,255,.15);}
    .card .label{font-size:18px;font-weight:700;color:#fff;}
    .card .desc{font-size:13px;color:rgba(255,255,255,.4);margin-top:3px;}
    .card .arrow{margin-left:auto;font-size:20px;color:rgba(255,255,255,.2);transition:transform .2s;}
    .card:hover .arrow{transform:translateX(4px);color:rgba(255,255,255,.5);}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <span class="logo">🎉</span>
    <h1>Quiz <span>Fin d'Année</span></h1>
    <p>Joue avec toute ta classe en temps réel</p>
    <div class="cards">
      <a href="/admin.html" class="card admin">
        <div class="icon">⚙️</div>
        <div><div class="label">Créer une partie</div><div class="desc">Crée les questions et contrôle le quiz</div></div>
        <span class="arrow">→</span>
      </a>
      <a href="/eleve.html" class="card eleve">
        <div class="icon">🎮</div>
        <div><div class="label">Rejoindre une partie</div><div class="desc">Entre le code et réponds aux questions</div></div>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
